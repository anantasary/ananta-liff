<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断入力</title>
  <style>
    /* 全体のトーンを落ち着いたベージュ系に */
    body { 
      font-size: 16px; 
      padding: 40px 20px; 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
      background-color: #fdfaf9; /* 真っ白を避けて高級感を */
      color: #3d3d3d; 
      line-height: 1.8; 
    }

    /* フォーム全体を包むカード */
    .container {
      max-width: 500px;
      margin: 0 auto;
    }

    /* 選択エリア：塗りつぶしと影でリッチに */
    .option-group { 
      margin-bottom: 35px; 
      padding: 25px; 
      background: #ffffff; 
      border-radius: 16px; 
      box-shadow: 0 4px 15px rgba(181, 141, 148, 0.12); /* 柔らかいピンク系の影 */
      border: none;
    }
    
    .option-title { 
      display: block; 
      margin-bottom: 20px; 
      font-weight: bold; 
      font-size: 12px;     
      color: #b58d94; 
      text-align: center;
      letter-spacing: 0.2em;
    }

    .radio-label { 
      display: flex;
      align-items: center;
      margin-bottom: 15px; 
      cursor: pointer; 
      padding: 16px; 
      font-size: 15px;    
      font-weight: 600;
      background: #fdf8f9; /* ほんのりピンク */
      border-radius: 10px;
      transition: all 0.3s ease;
    }
    
    .radio-label:last-child { margin-bottom: 0; }
    
    input[type="radio"] {
      accent-color: #d4a5ab; /* 落ち着いたピンク */
      margin-right: 15px;
      transform: scale(1.3);
    }

    /* 入力セクションの見出し */
    .input-label {
      font-size: 13px;
      color: #777;
      font-weight: bold;
      letter-spacing: 0.15em;
      display: block;
      margin-bottom: 8px;
      margin-left: 5px;
    }

    input[type="text"], input[type="number"] { 
      font-size: 18px; 
      padding: 18px; 
      width: 100%; 
      margin-bottom: 30px; 
      box-sizing: border-box; 
      border: 1px solid #e0d8d8;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
      transition: all 0.3s;
    }
    
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-color: #d4a5ab;
      box-shadow: 0 0 0 4px rgba(212, 165, 171, 0.15);
    }

    /* ボタン：塗りつぶしで力強く */
    button { 
      font-size: 16px; 
      font-weight: bold; 
      letter-spacing: 0.25em;
      padding: 20px; 
      width: 100%; 
      cursor: pointer; 
      background-color: #d4a5ab; /* 落ち着いたピンクの塗り */
      color: #ffffff; 
      border: none;
      border-radius: 12px; 
      margin-top: 10px; 
      box-shadow: 0 6px 20px rgba(212, 165, 171, 0.3);
      transition: all 0.3s;
    }
    
    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 10px rgba(212, 165, 171, 0.2);
    }

    button:disabled { 
      background-color: #ccc;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* 結果表示エリア */
    #resultArea { 
      display: none; 
      margin-top: 20px; 
      padding: 30px; 
      background: #ffffff; 
      border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      border: 1px solid #f0e6e6;
    }
    #resultContent {
      white-space: pre-wrap;
      font-size: 15px;
      color: #444;
      line-height: 2;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="inputForm">
      <div class="option-group">
        <span class="option-title">SELECT OPTION</span>
        <label class="radio-label">
          <input type="radio" name="type" value="list" checked>
          <span>キーワード一覧（全9数）</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="type" value="report">
          <span>解説メッセージ（主要3数）</span>
        </label>
      </div>

      <span class="input-label">YOUR NAME</span>
      <input id="name" type="text" placeholder="お名前（ニックネーム可）">

      <span class="input-label">BIRTHDAY</span>
      <input id="birth" type="number" placeholder="19900101">

      <button id="sendBtn" onclick="send()">DIAGNOSIS</button>
    </div>

    <div id="resultArea">
      <div id="resultContent"></div>
      <button onclick="liff.closeWindow()" style="background-color: #eee; color: #777; box-shadow: none; margin-top: 30px;">CLOSE</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";
    
    async function main() {
      await liff.init({ liffId: "2009800795-TjgaXLF7" });
      if (!liff.isLoggedIn()) liff.login();
    }

    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;

      if (!name || birth.length !== 8) { alert("お名前と生年月日(8桁)を入力してください"); return; }

      btn.disabled = true;
      btn.innerText = "ANALYZING...";

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId })
        });
        const resData = await response.json();

        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resultContent").innerText = resData.report;
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("診断結果をLINEへ送信しました。トーク画面をご確認ください。");
          liff.closeWindow();
        }
      } catch (e) {
        alert("エラーが発生しました。時間を置いて再度お試しください。");
      } finally {
        btn.disabled = false;
        btn.innerText = "DIAGNOSIS";
      }
    }
    main();
  </script>
</body>
</html>
