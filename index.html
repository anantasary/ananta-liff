<!DOCTYPE html>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
      async function main() {
        await liff.init({ liffId: "2009800795-TjgaXLF7" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();

        const name = "test"; // フォーム化するならここを入力にする
        const birth = "1990-01-01"; // 同上

        const payload = {
          userId: profile.userId,
          name: name,
          birth: birth
        };

        fetch("＜https://script.google.com/macros/s/AKfycbyPDfV-FglJeK_8tdPoQ8BN6B0elN-1m5lLhpf3beH4oudwtRL67O77TeC3SW7adB0/exec＞", {
          method: "POST",
          body: JSON.stringify(payload)
        });

        document.body.innerHTML = "送信完了";
      }

      main();
    </script>
  </body>
