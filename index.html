<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断</title>
  <style>
    /* くすみを一切排除した、清涼感のあるモダンデザイン */
    body { 
      font-size: 16px; 
      padding: 40px 20px; 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; 
      background-color: #f0f5f9; /* 澄んだ空気のような薄いブルーグレー */
      color: #334155; 
    }
    .container { 
      max-width: 400px; 
      margin: 0 auto; 
      background: #ffffff; 
      padding: 35px 25px; 
      border-radius: 20px; 
      box-shadow: 0 10px 25px rgba(148, 163, 184, 0.1); 
    }
    
    h2 { 
      font-size: 18px; 
      text-align: center; 
      color: #3b82f6; /* 清潔感のあるブルー */
      margin-bottom: 30px; 
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    
    /* 選択肢：スッキリと見やすく */
    .radio-label { 
      display: flex; 
      align-items: center; 
      margin-bottom: 12px; 
      padding: 18px; 
      background: #f8fafc; 
      border: 1px solid #e2e8f0; 
      border-radius: 12px; 
      cursor: pointer; 
      font-weight: bold; 
      transition: 0.2s;
    }
    .radio-label:has(input:checked) {
      border-color: #3b82f6;
      background: #eff6ff;
    }
    input[type="radio"] { 
      margin-right: 12px; 
      accent-color: #3b82f6; 
      transform: scale(1.2); 
    }
    
    .label-text { 
      font-size: 12px; 
      color: #94a3b8; 
      font-weight: bold; 
      margin-bottom: 6px; 
      display: block; 
    }
    
    input[type="text"], input[type="number"] { 
      font-size: 18px; 
      padding: 14px; 
      width: 100%; 
      margin-bottom: 25px; 
      box-sizing: border-box; 
      border: 1px solid #e2e8f0; 
      border-radius: 10px; 
      background: #fff; 
    }
    input:focus {
      outline: none;
      border-color: #3b82f6;
    }
    
    /* ボタン：透明感のある鮮やかなブルー */
    button { 
      font-size: 16px; 
      font-weight: bold; 
      padding: 18px; 
      width: 100%; 
      cursor: pointer; 
      background-color: #3b82f6; 
      color: #fff; 
      border: none; 
      border-radius: 12px; 
      transition: 0.3s; 
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.2);
      margin-top: 10px;
    }
    button:active { transform: scale(0.98); }

    /* 結果表示エリア */
    #resultArea { 
      display: none; 
      margin-top: 20px; 
      padding: 20px; 
      background: #f8fafc; 
      border-radius: 12px; 
    }
    #resTxt { 
      white-space: pre-wrap; 
      font-size: 15px; 
      color: #334155; 
      line-height: 1.7; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>ヨガ数秘学 診断</h2>
    
    <div id="inputForm">
      <span class="label-text">受け取り方法</span>
      <label class="radio-label">
        <input type="radio" name="type" value="list" checked>
        <span>キーワード一覧（全9数）</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="type" value="report">
        <span>解説メッセージ（主要3数）</span>
      </label>
      
      <span class="label-text">お名前</span>
      <input id="name" type="text" placeholder="例：はなこ">
      
      <span class="label-text">生年月日（8桁）</span>
      <input id="birth" type="number" placeholder="例：19900101">
      
      <button id="sendBtn" onclick="send()">診断結果を見る</button>
    </div>

    <div id="resultArea">
      <div id="resTxt"></div>
      <button onclick="liff.closeWindow()" style="margin-top:25px; background:#e2e8f0; color:#64748b; box-shadow:none;">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";

    async function main() { 
      await liff.init({ liffId: "2009800795-TjgaXLF7" }); 
      if (!liff.isLoggedIn()) liff.login(); 
    }
    
    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;
      
      if (!name || birth.length !== 8) { alert("入力を確認してください"); return; }
      
      btn.disabled = true; btn.innerText = "診断中...";

      try {
        const res = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId }) 
        });
        const json = await res.json();
        
        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resTxt").innerText = json.report; 
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("LINEへ診断結果を送りました！");
          liff.closeWindow();
        }
      } catch (e) { alert("エラーが発生しました。"); } finally { 
        btn.disabled = false; btn.innerText = "診断結果を見る"; 
      }
    }
    main();
  </script>
</body>
</html>
