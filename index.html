<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断入力</title>
  <style>
    body { 
      font-size: 18px; 
      padding: 30px 20px; 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; 
      background-color: #fff; 
      color: #555; 
      line-height: 1.6; 
    }

    /* 選択エリアを一番上に配置 */
    .option-group { 
      margin-bottom: 35px; 
      padding: 20px; 
      background: #fffafb; 
      border-radius: 12px; 
      border: 1px solid #ffeff1; 
    }
    
    .option-title { 
      display: block; 
      margin-bottom: 15px; 
      font-weight: normal; 
      font-size: 14px;     
      color: #b58d94; 
      text-align: center;
      letter-spacing: 0.05em;
    }

    .radio-label { 
      display: block; 
      margin-bottom: 10px; 
      cursor: pointer; 
      padding: 12px; 
      font-size: 16px;    
      background: #fff;
      border: 1px solid #f0f0f0;
      border-radius: 8px;
      transition: all 0.2s;
    }
    
    input[type="radio"] {
      accent-color: #ffc1cc;
      margin-right: 10px;
    }

    /* 入力セクション */
    .input-label {
      font-size: 13px;
      color: #aaa;
      letter-spacing: 0.1em;
      display: block;
      margin-bottom: 8px;
      margin-left: 5px;
    }

    input[type="text"], input[type="number"] { 
      font-size: 18px; 
      padding: 15px; 
      width: 100%; 
      margin-bottom: 20px; 
      box-sizing: border-box; 
      border: none;
      border-bottom: 1px solid #eee; 
      background-color: transparent;
      border-radius: 0;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-bottom-color: #ffc1cc;
    }

    button { 
      font-size: 17px; 
      font-weight: 600; 
      letter-spacing: 0.1em;
      padding: 16px; 
      width: 100%; 
      cursor: pointer; 
      background-color: transparent; 
      color: #ffc1cc; 
      border: 1px solid #ffc1cc; 
      border-radius: 30px; 
      margin-top: 25px; 
      transition: all 0.3s;
    }
    
    button:hover {
      background-color: #ffc1cc; 
      color: white; 
    }

    button:disabled { 
      color: #ddd;
      border-color: #ddd;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="option-group">
    <span class="option-title">RECEIVE OPTION</span>
    <label class="radio-label">
      <input type="radio" name="type" value="list" checked> キーワード一覧（全9数）
    </label>
    <label class="radio-label">
      <input type="radio" name="type" value="report"> 解説メッセージ（主要3数）
    </label>
  </div>

  <span class="input-label">YOUR NAME</span>
  <input id="name" type="text" placeholder="お名前（ニックネーム可）">

  <span class="input-label">BIRTHDAY</span>
  <input id="birth" type="number" placeholder="19900101">

  <button id="sendBtn" onclick="send()">RESULT</button>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";
    let userId = "";

    async function main() {
      try {
        await liff.init({ liffId: "2009800795-TjgaXLF7" });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          userId = profile.userId;
        }
      } catch (e) {
        console.error("LIFF初期化エラー", e);
      }
    }

    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;

      if (!name || !birth) {
        alert("名前と生年月日を入力してください");
        return;
      }

      btn.disabled = true;
      btn.innerText = "SENDING...";

      const payload = {
        userId: userId,
        name: name,
        birth: birth,
        type: type 
      };

      try {
        await fetch(GAS_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        alert("送信完了！LINEをご確認ください。");
        liff.closeWindow();
      } catch (e) {
        alert("送信に失敗しました。");
      } finally {
        btn.disabled = false;
        btn.innerText = "RESULT";
      }
    }

    main();
  </script>
</body>
</html>
