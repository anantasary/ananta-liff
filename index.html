<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ananta ヨガ数秘学</title>
  <link href="https://fonts.googleapis.com/css2?family=Arizonia&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
  <style>
    body { 
      font-size: 16px; 
      padding: 40px 20px; 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; 
      background-color: #fffafb; 
      color: #5d1a1a; /* ローズルノワール */
    }
    .container { 
      max-width: 400px; 
      margin: 0 auto; 
      background: #ffffff; 
      padding: 45px 25px 40px; 
      border-radius: 28px; 
      box-shadow: 0 20px 50px rgba(188, 0, 45, 0.1); 
      border: 1px solid #fceef2;
    }
    
    /* ブランドヘッダー：Arizoniaフォントでロゴを再現 */
    .brand-header { text-align: center; margin-bottom: 40px; }
    .brand-logo { 
      font-family: 'Arizonia', cursive; 
      font-size: 64px; /* 圧倒的に大きく、ロゴの勢いを出しました */
      color: #bc002d; /* スリーズ：鮮やかなチェリーレッド */
      display: block;
      line-height: 0.8;
      margin-bottom: 10px;
      text-shadow: 1px 1px 0px rgba(224, 47, 120, 0.1);
    }
    .brand-title { 
      font-family: 'Noto Serif JP', serif;
      font-size: 16px; 
      color: #5d1a1a; 
      font-weight: 700;
      letter-spacing: 0.3em;
      text-indent: 0.3em; /* 中央寄せの微調整 */
    }
    
    /* 選択肢：ローズベベをベースに */
    .radio-label { 
      display: flex; 
      align-items: center; 
      margin-bottom: 15px; 
      padding: 20px; 
      background: #fff6f9; /* ローズベベ */
      border: 2px solid transparent; 
      border-radius: 16px; 
      cursor: pointer; 
      font-weight: bold; 
      transition: 0.2s;
    }
    .radio-label:has(input:checked) {
      border-color: #e02f78; /* ローズフクシャ */
      background: #ffffff;
      box-shadow: 0 4px 15px rgba(224, 47, 120, 0.15);
    }
    input[type="radio"] { 
      margin-right: 15px; 
      accent-color: #e02f78; 
      transform: scale(1.4); 
    }
    
    .label-text { 
      font-size: 13px; 
      color: #9b6c6c; 
      font-weight: bold; 
      margin-bottom: 8px; 
      display: block; 
      padding-left: 5px;
    }
    
    input[type="text"], input[type="number"] { 
      font-size: 18px; 
      padding: 16px; 
      width: 100%; 
      margin-bottom: 30px; 
      box-sizing: border-box; 
      border: 2px solid #f2d5de; 
      border-radius: 12px; 
    }
    input:focus { outline: none; border-color: #e02f78; background: #fff; }
    
    /* 実行ボタン：ローズフクシャ〜スリーズの情熱的なグラデ */
    button { 
      font-size: 18px; 
      font-weight: bold; 
      padding: 20px; 
      width: 100%; 
      cursor: pointer; 
      background: linear-gradient(135deg, #e02f78 0%, #bc002d 100%); 
      color: #fff; 
      border: none; 
      border-radius: 50px; 
      transition: 0.3s; 
      box-shadow: 0 10px 25px rgba(224, 47, 120, 0.4);
      margin-top: 10px;
      letter-spacing: 0.1em;
    }
    button:active { transform: scale(0.97); }

    /* 結果表示エリア */
    #resultArea { 
      display: none; 
      margin-top: 25px; 
      padding: 25px; 
      background: #fff; 
      border-radius: 16px; 
      border: 2px solid #fceef2;
    }
    #resTxt { 
      white-space: pre-wrap; 
      font-size: 16px; 
      color: #5d1a1a; 
      line-height: 2; 
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-header">
      <span class="brand-logo">Ananta</span>
      <div class="brand-title">ヨガ数秘学 診断</div>
    </div>
    
    <div id="inputForm">
      <span class="label-text">受け取り方法</span>
      <label class="radio-label">
        <input type="radio" name="type" value="list" checked>
        <span>キーワード一覧（全9数）</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="type" value="report">
        <span>解説メッセージ（主要3数）</span>
      </label>
      
      <span class="label-text">お名前</span>
      <input id="name" type="text" placeholder="例：はなこ">
      
      <span class="label-text">生年月日（半角数字8桁）</span>
      <input id="birth" type="number" placeholder="例：19900101">
      
      <button id="sendBtn" onclick="send()">診断結果を見る</button>
    </div>

    <div id="resultArea">
      <div id="resTxt"></div>
      <button onclick="liff.closeWindow()" style="margin-top:35px; background:#f5f5f5; color:#aaa; box-shadow:none; border-radius:30px;">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";

    async function main() { 
      await liff.init({ liffId: "2009800795-TjgaXLF7" }); 
      if (!liff.isLoggedIn()) liff.login(); 
    }
    
    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;
      
      if (!name || birth.length !== 8) { 
        alert("お名前と生年月日（8桁）を入力してください。"); 
        return; 
      }
      
      btn.disabled = true; btn.innerText = "計算中...";

      try {
        const res = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId }) 
        });
        const json = await res.json();
        
        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resTxt").innerText = json.report; 
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("LINEへ診断結果を送りました！トーク画面をご確認ください。");
          liff.closeWindow();
        }
      } catch (e) { alert("通信エラーが発生しました。"); } finally { 
        btn.disabled = false; btn.innerText = "診断結果を見る"; 
      }
    }
    main();
  </script>
</body>
</html>
