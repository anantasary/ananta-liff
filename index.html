<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        font-size: 20px;
        padding: 20px;
        font-family: sans-serif;
      }

      input {
        font-size: 20px;
        padding: 10px;
        width: 100%;
        margin-bottom: 15px;
        box-sizing: border-box;
      }

      button {
        font-size: 20px;
        padding: 12px;
        width: 100%;
      }
    </style>
  </head>

  <body>

    名前（ニックネームOK）<br>
    <input id="name">

    生年月日（西暦8桁）<br>
    <input id="birth" placeholder="19900101">

    <button onclick="send()">送信</button>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
      let userId = "";

      async function main() {
        try {
          await liff.init({ liffId: "2009800795-TjgaXLF7" });

          if (!liff.isLoggedIn()) {
            liff.login();
            return;
          }

          const profile = await liff.getProfile();
          userId = profile.userId;

        } catch (e) {
          alert("初期化エラー");
          console.log(e);
        }
      }

      async function send() {
        try {
          await fetch("https://script.google.com/macros/s/AKfycbyPDfV-FglJeK_8tdPoQ8BN6B0elN-1m5lLhpf3beH4oudwtRL67O77TeC3SW7adB0/exec", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
              userId: userId,
              name: document.getElementById("name").value,
              birth: document.getElementById("birth").value
            })
          });

          alert("送信完了");

          liff.closeWindow();

        } catch (e) {
          alert("送信エラー");
          console.log(e);
        }
      }

      main();
    </script>

  </body>
</html>
