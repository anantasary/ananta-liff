<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断入力</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* * 全体の設定：
     * 背景は潔く白（#fff）。文字は深いネイビー（#1A253A）で知的に。
     */
    body { 
      font-size: 16px; 
      padding: 50px 20px; 
      font-family: "Helvetica Neue", Arial, "Hiragino Mincho ProN", "MS Mincho", serif; /* 和文は少しシャープに */
      background-color: #ffffff; 
      color: #1A253A; 
      line-height: 1.8; 
      letter-spacing: 0.03em;
    }

    .container {
      max-width: 450px;
      margin: 0 auto;
    }

    /* * 選択エリア：
     * 枠線をなくし、背景色をごく薄いグレーにしてスッキリと。
     */
    .option-group { 
      margin-bottom: 40px; 
      padding: 0; 
      background: #ffffff; 
    }
    
    /* * 英語見出し（RECEIVE OPTION）：
     * ここを洗練されたセリフ体に。文字間隔を広げて高級感を。
     */
    .option-title { 
      display: block; 
      margin-bottom: 25px; 
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600; 
      font-size: 14px;     
      color: #1A253A; 
      text-align: center;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .radio-label { 
      display: flex;
      align-items: center;
      margin-bottom: 15px; 
      cursor: pointer; 
      padding: 18px 20px; 
      font-size: 15px;    
      font-weight: normal;
      background: #f8f9fa; /* ごく薄いグレー */
      border-radius: 4px; /* 角丸を小さく */
      transition: all 0.2s ease;
    }
    
    /* 選択肢ホバー時にゴールドの線を薄く出す */
    .radio-label:hover {
      background: #f1f3f5;
    }
    
    /* ラジオボタン自体の色をネイビーに */
    input[type="radio"] {
      accent-color: #1A253A; 
      margin-right: 15px;
      transform: scale(1.1);
    }

    /* * 入力項目のラベル（YOUR NAME）：
     * セリフ体。色は少し薄くしてバランスを取る。
     */
    .input-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      color: #666;
      font-weight: 600;
      letter-spacing: 0.2em;
      display: block;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* * 入力欄：
     * 下線のみに。これが最も都会的で洗練されたスタイル。
     */
    input[type="text"], input[type="number"] { 
      font-size: 17px; 
      padding: 12px 0; 
      width: 100%; 
      margin-bottom: 35px; 
      box-sizing: border-box; 
      border: none;
      border-bottom: 1px solid #ccc;
      background-color: transparent;
      border-radius: 0;
      transition: all 0.3s;
    }
    
    /* プレースホルダーを薄く */
    input::placeholder { color: #ccc; font-weight: normal;}

    /* フォーカス時にゴールドの下線を出す */
    input[type="text"]:focus, input[type="number"]:focus {
      outline: none;
      border-bottom-color: #D4AF37; /* ゴールド */
    }

    /* * ボタン：
     * ネイビーの背景に白文字。これが最も信頼感を生む。
     * 角丸をなくし、シャープな長方形に。
     */
    button { 
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; 
      font-weight: 600; 
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 20px; 
      width: 100%; 
      cursor: pointer; 
      background-color: #1A253A; /* ネイビー */
      color: #ffffff; 
      border: 1px solid #1A253A;
      border-radius: 2px; /* ほぼ直角 */
      margin-top: 15px; 
      transition: all 0.3s ease;
    }
    
    /* ホバー時にゴールドの枠線とネイビーの文字に（反転） */
    button:hover {
      background-color: #ffffff; 
      color: #1A253A; 
      border-color: #D4AF37;
    }

    button:disabled { 
      background-color: #e0e0e0;
      border-color: #e0e0e0;
      color: #a0a0a0;
      cursor: not-allowed;
    }

    /* * 結果表示エリア：
     * 凛としたたたずまいに。
     */
    #resultArea { 
      display: none; 
      margin-top: 20px; 
      padding: 40px; 
      background: #ffffff; 
      border-radius: 2px; 
      border: 1px solid #eee;
    }
    #resultContent {
      white-space: pre-wrap;
      font-size: 14px;
      color: #333;
      line-height: 2.2; /* 行間をさらに広く */
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="inputForm">
      <div class="option-group">
        <span class="option-title">RECEIVE OPTION</span>
        <label class="radio-label">
          <input type="radio" name="type" value="list" checked>
          <span>キーワード一覧（全9数）</span>
        </label>
        <label class="radio-label">
          <input type="radio" name="type" value="report">
          <span>解説メッセージ（主要3数）</span>
        </label>
      </div>

      <span class="input-label">YOUR NAME</span>
      <input id="name" type="text" placeholder="お名前">

      <span class="input-label">BIRTHDAY</span>
      <input id="birth" type="number" placeholder="19900101">

      <button id="sendBtn" onclick="send()">DIAGNOSIS</button>
    </div>

    <div id="resultArea">
      <div id="resultContent"></div>
      <button onclick="liff.closeWindow()" style="background-color: #ffffff; color: #777; border-color: #eee; margin-top: 30px;">CLOSE</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";
    
    async function main() {
      try {
        await liff.init({ liffId: "2009800795-TjgaXLF7" });
        if (!liff.isLoggedIn()) liff.login();
      } catch (e) {
        console.error("LIFF初期化エラー", e);
      }
    }

    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;

      if (!name || birth.length !== 8) { alert("お名前と生年月日(8桁)を入力してください"); return; }

      btn.disabled = true;
      btn.innerText = "ANALYZING...";

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId })
        });
        const resData = await response.json();

        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resultContent").innerText = resData.report;
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("診断結果をLINEへ送信しました。");
          liff.closeWindow();
        }
      } catch (e) {
        alert("エラーが発生しました。");
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.innerText = "DIAGNOSIS";
      }
    }
    main();
  </script>
</body>
</html>
