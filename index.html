<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      body {
        font-size: 20px;
        padding: 20px;
      }
      input {
        font-size: 20px;
        padding: 10px;
        width: 90%;
        margin-bottom: 15px;
      }
      button {
        font-size: 20px;
        padding: 12px;
        width: 100%;
      }
    </style>
  </head>

  <body>

    名前<br>
    <input id="name">

    生年月日<br>
    <input id="birth" placeholder="1990-01-01">

    <button onclick="send()">送信</button>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
      let userId = "";

      async function main() {
        await liff.init({ liffId: "2009800795-TjgaXLF7" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId;
      }

      async function send() {
        await fetch("GAS_URL", {
          method: "POST",
          body: JSON.stringify({
            userId: userId,
            name: document.getElementById("name").value,
            birth: document.getElementById("birth").value
          })
        });

        document.body.innerHTML = "送信完了";
      }

      main();
    </script>

  </body>
</html>
      main();
    </script>
  </body>
</html>
