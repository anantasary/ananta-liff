<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断</title>
  <style>
    /* 「くすみ」を排除した、光を感じるデザイン */
    body { 
      font-size: 16px; 
      padding: 40px 20px; 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; 
      background-color: #f7f9fa; /* 明るく爽やかな背景 */
      color: #333; 
    }
    .container { 
      max-width: 400px; 
      margin: 0 auto; 
      background: #ffffff; 
      padding: 35px 25px; 
      border-radius: 24px; 
      box-shadow: 0 20px 40px rgba(0,0,0,0.08); /* 浮遊感のある影 */
    }
    
    h2 { 
      font-size: 20px; 
      text-align: center; 
      color: #d4af37; /* 鮮やかなゴールド */
      margin-bottom: 30px; 
      font-weight: bold;
      letter-spacing: 0.1em;
    }
    
    /* 選択肢：明るく清潔に */
    .radio-label { 
      display: flex; 
      align-items: center; 
      margin-bottom: 12px; 
      padding: 18px; 
      background: #fff; 
      border: 2px solid #f0f0f0; 
      border-radius: 16px; 
      cursor: pointer; 
      font-weight: bold; 
      transition: 0.2s;
    }
    .radio-label:has(input:checked) {
      border-color: #d4af37;
      background: #fffdf7;
    }
    input[type="radio"] { 
      margin-right: 12px; 
      accent-color: #d4af37; 
      transform: scale(1.3); 
    }
    
    .label-text { 
      font-size: 13px; 
      color: #b0b0b0; 
      font-weight: bold; 
      margin-bottom: 8px; 
      display: block; 
      padding-left: 5px;
    }
    
    input[type="text"], input[type="number"] { 
      font-size: 18px; 
      padding: 15px; 
      width: 100%; 
      margin-bottom: 25px; 
      box-sizing: border-box; 
      border: 2px solid #f0f0f0; 
      border-radius: 12px; 
      background: #fff; 
      transition: 0.3s;
    }
    input:focus {
      outline: none;
      border-color: #d4af37;
    }
    
    /* ボタン：華やかなゴールド */
    button { 
      font-size: 17px; 
      font-weight: bold; 
      padding: 18px; 
      width: 100%; 
      cursor: pointer; 
      background: linear-gradient(135deg, #e6c258 0%, #d4af37 100%); /* 輝きのあるグラデーション */
      color: #fff; 
      border: none; 
      border-radius: 50px; 
      transition: 0.3s; 
      box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
      margin-top: 10px;
    }
    button:active { transform: scale(0.98); }

    /* 結果表示：パッと見やすく */
    #resultArea { 
      display: none; 
      margin-top: 20px; 
      padding: 25px; 
      background: #fdfdfd; 
      border-radius: 16px; 
      border: 1px solid #f0f0f0;
    }
    #resTxt { 
      white-space: pre-wrap; 
      font-size: 16px; 
      color: #333; 
      line-height: 1.9; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Yoga Numerology</h2>
    
    <div id="inputForm">
      <span class="label-text">診断方法</span>
      <label class="radio-label"><input type="radio" name="type" value="list" checked><span>全9つの数字を一覧で見る</span></label>
      <label class="radio-label"><input type="radio" name="type" value="report"><span>解説をLINEで受け取る</span></label>
      
      <span class="label-text">お名前</span>
      <input id="name" type="text" placeholder="例：花子">
      
      <span class="label-text">生年月日（8桁）</span>
      <input id="birth" type="number" placeholder="例：19900101">
      
      <button id="sendBtn" onclick="send()">診断する</button>
    </div>

    <div id="resultArea">
      <div id="resTxt"></div>
      <button onclick="liff.closeWindow()" style="margin-top:30px; background:#f0f0f0; color:#888; box-shadow:none;">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";

    async function main() { 
      await liff.init({ liffId: "2009800795-TjgaXLF7" }); 
      if (!liff.isLoggedIn()) liff.login(); 
    }
    
    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;
      
      if (!name || birth.length !== 8) { alert("入力を確認してください"); return; }
      
      btn.disabled = true; btn.innerText = "計算中...";

      try {
        const res = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId }) 
        });
        const json = await res.json();
        
        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          // Undefined対策：確実にjson.reportを表示
          document.getElementById("resTxt").innerText = json.report; 
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("LINEへ診断結果を送りました！");
          liff.closeWindow();
        }
      } catch (e) { alert("エラーが発生しました。"); } finally { 
        btn.disabled = false; btn.innerText = "診断する"; 
      }
    }
    main();
  </script>
</body>
</html>
