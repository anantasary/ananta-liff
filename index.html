<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ananta ヨガ数秘学</title>
  <style>
    /* ご指定のカラー：ローズベベ, ローズルノワール, ローズフクシャ, スリーズ */
    body { 
      font-size: 16px; 
      padding: 40px 20px; 
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; 
      background-color: #fff9fb; /* ローズベベを意識した極薄いピンク背景 */
      color: #5d1a1a; /* ローズルノワール寄りの深い色 */
    }
    .container { 
      max-width: 400px; 
      margin: 0 auto; 
      background: #ffffff; 
      padding: 35px 25px; 
      border-radius: 24px; 
      box-shadow: 0 15px 40px rgba(224, 47, 120, 0.1); /* フクシャ系の柔らかな影 */
      border: 1px solid #fceef2;
    }
    
    h2 { 
      font-size: 20px; 
      text-align: center; 
      color: #bc002d; /* スリーズ（チェリーレッド） */
      margin-bottom: 30px; 
      font-weight: bold;
      letter-spacing: 0.1em;
    }
    h2 span { font-size: 14px; display: block; color: #5d1a1a; margin-bottom: 5px; opacity: 0.8; }
    
    .radio-label { 
      display: flex; 
      align-items: center; 
      margin-bottom: 12px; 
      padding: 18px; 
      background: #fff5f8; /* ローズベベ：優しいピンク */
      border: 2px solid transparent; 
      border-radius: 16px; 
      cursor: pointer; 
      font-weight: bold; 
      transition: 0.2s;
    }
    .radio-label:has(input:checked) {
      border-color: #e02f78; /* ローズフクシャ */
      background: #ffffff;
    }
    input[type="radio"] { 
      margin-right: 12px; 
      accent-color: #e02f78; 
      transform: scale(1.3); 
    }
    
    .label-text { 
      font-size: 13px; 
      color: #9b6c6c; 
      font-weight: bold; 
      margin-bottom: 8px; 
      display: block; 
    }
    
    input[type="text"], input[type="number"] { 
      font-size: 18px; 
      padding: 15px; 
      width: 100%; 
      margin-bottom: 25px; 
      box-sizing: border-box; 
      border: 2px solid #f2d5de; 
      border-radius: 12px; 
      background: #fff; 
    }
    input:focus {
      outline: none;
      border-color: #e02f78;
    }
    
    /* ボタン：鮮やかなローズフクシャからスリーズへのグラデーション */
    button { 
      font-size: 17px; 
      font-weight: bold; 
      padding: 18px; 
      width: 100%; 
      cursor: pointer; 
      background: linear-gradient(135deg, #e02f78 0%, #bc002d 100%); 
      color: #fff; 
      border: none; 
      border-radius: 50px; 
      transition: 0.3s; 
      box-shadow: 0 8px 20px rgba(224, 47, 120, 0.3);
      margin-top: 10px;
    }
    button:active { transform: scale(0.98); }

    #resultArea { 
      display: none; 
      margin-top: 20px; 
      padding: 25px; 
      background: #fdfafb; 
      border-radius: 16px; 
      border: 1px solid #f2d5de;
    }
    #resTxt { 
      white-space: pre-wrap; 
      font-size: 15px; 
      color: #5d1a1a; /* ローズルノワール */
      line-height: 1.8; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h2><span>Ananta</span>ヨガ数秘学 診断</h2>
    
    <div id="inputForm">
      <span class="label-text">受け取り方法</span>
      <label class="radio-label">
        <input type="radio" name="type" value="list" checked>
        <span>キーワード一覧（全9数）</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="type" value="report">
        <span>解説メッセージ（主要3数）</span>
      </label>
      
      <span class="label-text">お名前</span>
      <input id="name" type="text" placeholder="例：はなこ">
      
      <span class="label-text">生年月日（8桁）</span>
      <input id="birth" type="number" placeholder="例：19900101">
      
      <button id="sendBtn" onclick="send()">診断結果を見る</button>
    </div>

    <div id="resultArea">
      <div id="resTxt"></div>
      <button onclick="liff.closeWindow()" style="margin-top:30px; background:#f0f0f0; color:#888; box-shadow:none;">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";

    async function main() { 
      await liff.init({ liffId: "2009800795-TjgaXLF7" }); 
      if (!liff.isLoggedIn()) liff.login(); 
    }
    
    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;
      
      if (!name || birth.length !== 8) { alert("入力を確認してください"); return; }
      
      btn.disabled = true; btn.innerText = "診断中...";

      try {
        const res = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId }) 
        });
        const json = await res.json();
        
        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resTxt").innerText = json.report; 
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("LINEへ診断結果を送りました！");
          liff.closeWindow();
        }
      } catch (e) { alert("エラーが発生しました。再度お試しください。"); } finally { 
        btn.disabled = false; btn.innerText = "診断結果を見る"; 
      }
    }
    main();
  </script>
</body>
</html>
