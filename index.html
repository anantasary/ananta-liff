<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断入力</title>
  <style>
    body { font-size: 18px; padding: 40px 25px; font-family: sans-serif; background-color: #fff; color: #333; line-height: 1.6; }
    .option-group { margin-bottom: 40px; padding: 20px; background: #fff; border-radius: 12px; border: 1.5px solid #f5e6e8; }
    .option-title { display: block; margin-bottom: 15px; font-weight: bold; font-size: 13px; color: #b58d94; text-align: center; letter-spacing: 0.15em; }
    .radio-label { display: block; margin-bottom: 12px; cursor: pointer; padding: 15px; font-size: 16px; font-weight: 500; border: 1px solid #ddd; border-radius: 8px; }
    .input-label { font-size: 14px; color: #444; font-weight: bold; letter-spacing: 0.12em; display: block; margin-bottom: 10px; }
    input[type="text"], input[type="number"] { font-size: 18px; padding: 12px 5px; width: 100%; margin-bottom: 30px; box-sizing: border-box; border: none; border-bottom: 2px solid #eee; background-color: transparent; }
    input::placeholder { color: #ccc; }
    button { font-size: 16px; font-weight: bold; letter-spacing: 0.2em; padding: 18px; width: 100%; cursor: pointer; background-color: transparent; color: #ffc1cc; border: 2px solid #ffc1cc; border-radius: 40px; margin-top: 30px; }
    #resultArea { display: none; margin-top: 20px; padding: 20px; background: #fafafa; border-radius: 15px; border: 1px solid #eee; white-space: pre-wrap; }
  </style>
</head>
<body>

  <div id="inputForm">
    <div class="option-group">
      <span class="option-title">RECEIVE OPTION</span>
      <label class="radio-label"><input type="radio" name="type" value="list" checked> <span>キーワード一覧（全9数）</span></label>
      <label class="radio-label"><input type="radio" name="type" value="report"> <span>解説メッセージ（主要3数）</span></label>
    </div>

    <span class="input-label">YOUR NAME</span>
    <input id="name" type="text" placeholder="お名前">
    <span class="input-label">BIRTHDAY</span>
    <input id="birth" type="number" placeholder="19900101">

    <button id="sendBtn" onclick="send()">RESULT</button>
  </div>

  <div id="resultArea">
    <div id="resultContent" style="font-size: 15px; color: #555;"></div>
    <button onclick="liff.closeWindow()" style="margin-top:20px; border-color:#ccc; color:#888;">閉じる</button>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";
    
    async function main() {
      await liff.init({ liffId: "2009800795-TjgaXLF7" });
      if (!liff.isLoggedIn()) liff.login();
    }

    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;

      if (!name || birth.length !== 8) { alert("正しく入力してください"); return; }

      btn.disabled = true;
      btn.innerText = "CALCULATING...";

      try {
        // GASにデータを送り、結果を受け取る
        const response = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId })
        });
        const resData = await response.json();

        if (type === "list") {
          // 「一覧」なら、GASから返ってきたキーワード付きの文章を表示
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resultContent").innerText = resData.report;
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("LINEへ解説を送信しました！");
          liff.closeWindow();
        }
      } catch (e) {
        alert("エラーが発生しました。");
        console.error(e);
      } finally {
        btn.disabled = false;
        btn.innerText = "RESULT";
      }
    }
    main();
  </script>
</body>
</html>
