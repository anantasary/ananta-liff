<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ananta ヨガ数秘学</title>
  <link href="https://fonts.googleapis.com/css2?family=Arizonia&display=swap" rel="stylesheet">
  <style>
    /* デザイン設定（維持） */
    body { font-size: 16px; padding: 40px 20px; font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f0f9f9; color: #333; }
    .container { max-width: 400px; margin: 0 auto; background: #ffffff; padding: 40px 25px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0, 194, 195, 0.08); border: 1px solid #e0f2f2; }
    .brand-header { text-align: center; margin-bottom: 35px; }
    .brand-logo { font-family: 'Arizonia', cursive; font-size: 48px; color: #708090; display: block; line-height: 1; margin-bottom: 5px; }
    .brand-title { font-size: 16px; color: #708090; font-weight: bold; letter-spacing: 0.2em; text-indent: 0.2em; }
    .radio-label { display: flex; align-items: center; margin-bottom: 12px; padding: 18px; background: #f0fdfd; border: 2px solid transparent; border-radius: 14px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .radio-label:has(input:checked) { border-color: #00C2C3; background: #ffffff; box-shadow: 0 4px 12px rgba(0, 194, 195, 0.1); }
    input[type="radio"] { margin-right: 12px; accent-color: #00C2C3; transform: scale(1.3); }
    .label-text { font-size: 13px; color: #88aaaa; font-weight: bold; margin-bottom: 8px; display: block; padding-left: 5px; }
    input[type="text"], input[type="number"] { font-size: 18px; padding: 15px; width: 100%; margin-bottom: 25px; box-sizing: border-box; border: 2px solid #e0f2f2; border-radius: 10px; background: #fdfdfd; }
    input:focus { outline: none; border-color: #00C2C3; background: #fff; }
    button { font-size: 17px; font-weight: bold; padding: 18px; width: 100%; cursor: pointer; background: linear-gradient(135deg, #81D8D0 0%, #00C2C3 100%); color: #fff; border: none; border-radius: 50px; transition: 0.3s; box-shadow: 0 8px 20px rgba(0, 194, 195, 0.25); margin-top: 10px; letter-spacing: 0.1em; }
    button:active { transform: scale(0.98); }
    #resultArea { display: none; margin-top: 25px; padding: 25px; background: #fdfdfd; border-radius: 14px; border: 1px solid #e0f2f2; }
    #resTxt { white-space: pre-wrap; font-size: 15px; color: #333; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand-header">
      <span class="brand-logo">Ananta</span>
      <div class="brand-title">ヨガ数秘学 診断</div>
    </div>
    
    <div id="inputForm">
      <span class="label-text">受け取り方法</span>
      <label class="radio-label">
        <input type="radio" name="type" value="list" checked>
        <span>キーワード一覧（全9数）</span>
      </label>
      <label class="radio-label">
        <input type="radio" name="type" value="report">
        <span>解説メッセージ（主要3数）</span>
      </label>
      
      <span class="label-text">お名前</span>
      <input id="name" type="text" placeholder="例：はなこ">
      
      <span class="label-text">生年月日（半角数字8桁）</span>
      <input id="birth" type="number" placeholder="例：19900101">
      
      <button id="sendBtn" onclick="send()">診断結果を見る</button>
    </div>

    <div id="resultArea">
      <div id="resTxt"></div>
      <button onclick="liff.closeWindow()" style="margin-top:30px; background:#f0f0f0; color:#888; box-shadow:none; border-radius:30px;">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // 1. 最新のGAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbx1YF_vGoT8RGfuTXcxMOoM1TLmKiW6lIsdDcZrwvaXjnyYyGQiKbzy3EkswYMyG_Zp/exec";

    async function main() { 
      // 2. 新しいLIFF IDに書き換え
      await liff.init({ liffId: "2009808397-hQS6hoYO" }); 
      
      if (!liff.isLoggedIn()) {
        // ログインを促す（ここで通常、認証画面が出ます）
        liff.login();
      } else {
        // ログイン済みの場合、念のためプロファイル取得を試みて権限チェック
        try {
          await liff.getProfile();
        } catch (e) {
          console.error("Profile access denied");
        }
      }
    }
    
    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;
      
      if (!name || birth.length !== 8) { 
        alert("お名前と生年月日（8桁）を入力してください。"); 
        return; 
      }
      
      btn.disabled = true; btn.innerText = "計算中...";

      try {
        // userIdを確実に取得してGASへ送る
        const context = liff.getContext();
        const userId = context ? context.userId : "";

        const res = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ name, birth, type, userId: userId }) 
        });
        const json = await res.json();
        
        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resTxt").innerText = json.report; 
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("LINEへ診断結果を送りました！トーク画面をご確認ください。");
          liff.closeWindow();
        }
      } catch (e) { 
        alert("通信エラーが発生しました。"); 
      } finally { 
        btn.disabled = false; btn.innerText = "診断結果を見る"; 
      }
    }
    main();
  </script>
</body>
</html>
