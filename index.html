<!DOCTYPE html>
<html>
  <body>
    <h3>ヨガ数秘学診断</h3>

    名前<br>
    <input id="name"><br><br>

    生年月日<br>
    <input id="birth" placeholder="1990-01-01"><br><br>

    <button onclick="send()">送信</button>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script>
      let userId = "";

      async function main() {
        await liff.init({ liffId: "2009800795-TjgaXLF7" });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        userId = profile.userId;
      }

      async function send() {
        await fetch("GAS_URL", {
          method: "POST",
          body: JSON.stringify({
            userId,
            name: document.getElementById("name").value,
            birth: document.getElementById("birth").value
          })
        });

        document.body.innerHTML = "完了";
      }

      main();
    </script>
  </body>
</html>
