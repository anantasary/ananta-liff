<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;700&display=swap" rel="stylesheet">
  <style>
    /* * 「黄色」を排除し、深いネイビー（#1A253A）と
     * 真鍮のようなゴールド（#C3A461）で構成
     */
    body { 
      font-size: 16px; 
      padding: 50px 20px; 
      font-family: 'Noto Serif JP', serif; /* 明朝体で品格を */
      background-color: #f4f6f8; /* 落ち着いたグレー */
      color: #1A253A; /* 深いネイビー */
    }
    .container { 
      max-width: 420px; 
      margin: 0 auto; 
      background: #ffffff; 
      padding: 40px 30px; 
      border-radius: 12px; 
      box-shadow: 0 10px 30px rgba(26, 37, 58, 0.08); /* 深いネイビーを帯びた影 */
      border: 1px solid #e1e8ed;
    }
    
    h2 { 
      font-size: 21px; 
      text-align: center; 
      color: #1A253A; 
      margin-bottom: 35px; 
      font-weight: 700;
      letter-spacing: 0.1em;
    }
    
    /* 選択肢：枠線をゴールドに */
    .radio-label { 
      display: flex; 
      align-items: center; 
      margin-bottom: 15px; 
      padding: 20px; 
      background: #fff; 
      border: 1px solid #e1e8ed; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 500; 
      transition: 0.3s;
    }
    .radio-label:has(input:checked) {
      border-color: #C3A461; /* 真鍮ゴールド */
      background-color: #fbf9f5;
      box-shadow: 0 4px 12px rgba(195, 164, 97, 0.15);
    }
    input[type="radio"] { 
      margin-right: 15px; 
      accent-color: #C3A461; /* ゴールド */
      transform: scale(1.3); 
    }
    
    .label-text { 
      font-size: 14px; 
      color: #7f8c8d; 
      font-weight: 500; 
      margin-bottom: 10px; 
      display: block; 
    }
    
    input[type="text"], input[type="number"] { 
      font-size: 18px; 
      padding: 18px; 
      width: 100%; 
      margin-bottom: 30px; 
      box-sizing: border-box; 
      border: 1px solid #e1e8ed; 
      border-radius: 8px; 
      background: #fdfdfd; 
      font-family: sans-serif; /* 入力文字はゴシックで読みやすく */
    }
    input:focus {
      outline: none;
      border-color: #C3A461;
    }
    
    /* ボタン：深紺の背景にゴールドの文字。これが最も品格が出る。 */
    button { 
      font-size: 18px; 
      font-weight: 700; 
      padding: 20px; 
      width: 100%; 
      cursor: pointer; 
      background-color: #1A253A; /* 深いネイビー */
      color: #C3A461; /* ゴールドの文字 */
      border: 1px solid #1A253A; 
      border-radius: 8px; 
      transition: 0.3s; 
      box-shadow: 0 5px 15px rgba(26, 37, 58, 0.2);
      letter-spacing: 0.1em;
    }
    button:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(26, 37, 58, 0.2); }

    /* 結果表示：凛としたたたずまいに */
    #resultArea { 
      display: none; 
      margin-top: 25px; 
      padding: 30px; 
      background: #fbfbfb; 
      border-radius: 8px; 
      border: 1px solid #e1e8ed;
    }
    #resTxt { 
      white-space: pre-wrap; 
      font-size: 16px; 
      color: #1A253A; 
      line-height: 2; 
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>ヨガ数秘学 診断ツール</h2>
    
    <div id="inputForm">
      <span class="label-text">受け取り方法</span>
      <label class="radio-label"><input type="radio" name="type" value="list" checked><span>キーワード一覧（全9数）</span></label>
      <label class="radio-label"><input type="radio" name="type" value="report"><span>解説メッセージ（主要3数）</span></label>
      
      <span class="label-text">お名前</span>
      <input id="name" type="text" placeholder="例：花子">
      
      <span class="label-text">生年月日（8桁）</span>
      <input id="birth" type="number" placeholder="例：19900101">
      
      <button id="sendBtn" onclick="send()">診断結果を見る</button>
    </div>

    <div id="resultArea">
      <div id="resTxt"></div>
      <button onclick="liff.closeWindow()" style="margin-top:35px; background:#e1e8ed; color:#7f8c8d; box-shadow:none; border:none;">閉じる</button>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";

    async function main() { 
      await liff.init({ liffId: "2009800795-TjgaXLF7" }); 
      if (!liff.isLoggedIn()) liff.login(); 
    }
    
    async function send() {
      const btn = document.getElementById("sendBtn");
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;
      
      if (!name || birth.length !== 8) { alert("入力を確認してください"); return; }
      
      btn.disabled = true; btn.innerText = "計算中...";

      try {
        const res = await fetch(GAS_URL, { 
          method: "POST", 
          body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId }) 
        });
        const json = await res.json();
        
        if (type === "list") {
          document.getElementById("inputForm").style.display = "none";
          document.getElementById("resTxt").innerText = json.report; // Undefined対策
          document.getElementById("resultArea").style.display = "block";
        } else {
          alert("LINEへ診断結果を送りました！トーク画面を確認してください。");
          liff.closeWindow();
        }
      } catch (e) { alert("エラーが発生しました。再度お試しください。"); } finally { 
        btn.disabled = false; btn.innerText = "診断結果を見る"; 
      }
    }
    main();
  </script>
</body>
</html>
