<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヨガ数秘学 診断入力</title>
  <style>
    body { font-size: 18px; padding: 40px 25px; font-family: sans-serif; background-color: #fff; color: #333; line-height: 1.6; }
    .option-group { margin-bottom: 40px; padding: 20px; background: #fff; border-radius: 12px; border: 1.5px solid #f5e6e8; }
    .option-title { display: block; margin-bottom: 15px; font-weight: bold; font-size: 13px; color: #b58d94; text-align: center; letter-spacing: 0.15em; }
    .radio-label { display: block; margin-bottom: 12px; cursor: pointer; padding: 15px; font-size: 16px; font-weight: 500; border: 1px solid #ddd; border-radius: 8px; }
    .input-label { font-size: 14px; color: #444; font-weight: bold; letter-spacing: 0.12em; display: block; margin-bottom: 10px; }
    input[type="text"], input[type="number"] { font-size: 18px; padding: 12px 5px; width: 100%; margin-bottom: 30px; box-sizing: border-box; border: none; border-bottom: 2px solid #eee; background-color: transparent; }
    button { font-size: 16px; font-weight: bold; letter-spacing: 0.2em; padding: 18px; width: 100%; cursor: pointer; background-color: transparent; color: #ffc1cc; border: 2px solid #ffc1cc; border-radius: 40px; margin-top: 30px; }
    
    /* 【追加】結果表示エリアのスタイル */
    #resultArea { display: none; margin-top: 20px; padding: 20px; background: #fafafa; border-radius: 15px; border: 1px solid #eee; }
    .result-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 8px 0; font-size: 15px; }
    .result-pos { color: #888; }
    .result-val { font-weight: bold; color: #b58d94; }
  </style>
</head>
<body>

  <div id="inputForm">
    <div class="option-group">
      <span class="option-title">RECEIVE OPTION</span>
      <label class="radio-label"><input type="radio" name="type" value="list" checked> キーワード一覧（ウェブで見る）</label>
      <label class="radio-label"><input type="radio" name="type" value="report"> 解説メッセージ（LINEに送る）</label>
    </div>

    <span class="input-label">YOUR NAME</span>
    <input id="name" type="text" placeholder="お名前">
    <span class="input-label">BIRTHDAY</span>
    <input id="birth" type="number" placeholder="19900101">

    <button id="sendBtn" onclick="send()">RESULT</button>
  </div>

  <div id="resultArea">
    <div id="resultContent"></div>
    <button onclick="liff.closeWindow()" style="margin-top:20px; border-color:#ccc; color:#888;">閉じる</button>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYkJz_KO8fHsFcXj6GdC4Zo1hWwjbgU2Opcm6DWh0p1g8dalbKKof_zFe6lp6D9oU/exec";
    
    async function main() {
      await liff.init({ liffId: "2009800795-TjgaXLF7" });
      if (!liff.isLoggedIn()) liff.login();
    }

    // 数字を計算するロジック（ウェブ表示用）
    function calculate(birth) {
      const reduce = (n) => {
        n = Number(n);
        while (n > 11) n = String(n).split('').reduce((a, b) => Number(a) + Number(b), 0);
        return n;
      };
      const sumAll = (s) => s.split('').reduce((a, b) => a + Number(b), 0);
      
      return {
        "ソウル": reduce(birth.substring(6, 8)),
        "レッスン": reduce(birth.substring(4, 6)),
        "ファンデーション": reduce(Number(birth.substring(4, 6)) + Number(birth.substring(6, 8))),
        "ギフト": reduce(birth.substring(2, 4)),
        "パスト": reduce(birth.substring(0, 4)),
        "アセット": reduce(reduce(birth.substring(2, 4)) + reduce(birth.substring(0, 4))),
        "プロジェクション": reduce(sumAll(birth)),
        "コア": reduce(reduce(birth.substring(4, 6)) + reduce(sumAll(birth))),
        "パーパス": reduce(sumAll(birth))
      };
    }

    async function send() {
      const name = document.getElementById("name").value;
      const birth = document.getElementById("birth").value;
      const type = document.querySelector('input[name="type"]:checked').value;

      if (!name || birth.length !== 8) { alert("正しく入力してください"); return; }

      // 1. スプシ保存とLINE送信のためにGASへデータは飛ばす
      fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ name, birth, type, userId: liff.getContext()?.userId }) });

      // 2. 「一覧」なら画面を書き換えて終了
      if (type === "list") {
        const nums = calculate(birth);
        let html = `<div style="text-align:center; font-weight:bold; margin-bottom:20px;">${name}さんの診断結果</div>`;
        for (let key in nums) {
          html += `<div class="result-item"><span class="result-pos">${key}</span><span class="result-val">${nums[key]}</span></div>`;
        }
        document.getElementById("inputForm").style.display = "none";
        document.getElementById("resultContent").innerHTML = html;
        document.getElementById("resultArea").style.display = "block";
      } else {
        alert("LINEへ解説を送信しました！");
        liff.closeWindow();
      }
    }
    main();
  </script>
</body>
</html>
